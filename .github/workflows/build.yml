name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: codext-windows
          - os: macos-latest
            artifact_name: codext-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm install

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri (Windows)
        if: matrix.os == 'windows-latest'
        run: npx tauri build --bundles nsis

      - name: Build Tauri (macOS)
        if: matrix.os == 'macos-latest'
        run: npx tauri build --bundles dmg

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Rename Windows installer
        run: mv artifacts/codext-windows/*.exe artifacts/CODEXT-windows-setup.exe

      - name: Rename macOS dmg
        run: mv artifacts/codext-macos/*.dmg artifacts/CODEXT-macos.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CODEXT ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/CODEXT-windows-setup.exe
            artifacts/CODEXT-macos.dmg